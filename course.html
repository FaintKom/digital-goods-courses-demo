<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Демо-урок · Запуск магазина цифровых товаров</title>
<style>
  :root{
    --bg:#0f1115; --panel:#141821; --card:#171a21; --card2:#1d212b; --line:#2a2f3a;
    --txt:#e8eaed; --muted:#9aa3b2; --accent:#ff7a18; --accent2:#3b82f6; --ok:#34d399; --bad:#f87171;
    --tg:#2b5278; --tgbg:#0e1621;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:16px/1.6 -apple-system,Segoe UI,Roboto,Arial,sans-serif}
  a{color:inherit;text-decoration:none}

  .top{display:flex;align-items:center;justify-content:space-between;gap:16px;
    height:58px;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20}
  .top .back{color:var(--muted);font-size:14px}
  .top .ttl{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prog{display:flex;align-items:center;gap:10px;min-width:180px}
  .prog .bar{flex:1;height:7px;background:var(--card2);border-radius:5px;overflow:hidden}
  .prog .bar i{display:block;height:100%;width:0;background:var(--accent);transition:width .35s}
  .prog .pct{font-size:13px;color:var(--muted);min-width:34px;text-align:right}

  .layout{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 58px)}
  .side{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;max-height:calc(100vh - 58px);position:sticky;top:58px}
  .mod{border-bottom:1px solid var(--line)}
  .mod>.mhead{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
  .mod>.mhead:hover{background:var(--card)}
  .mod .mnum{width:24px;height:24px;border-radius:6px;background:var(--card2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}
  .mod .mttl{font-size:14px;font-weight:600;flex:1}
  .mod .chev{color:var(--muted);font-size:12px;transition:.2s}
  .mod.open .chev{transform:rotate(90deg)}
  .lessons{display:none;padding:0 0 8px}
  .mod.open .lessons{display:block}
  .lesson{display:flex;align-items:center;gap:9px;padding:9px 16px 9px 46px;cursor:pointer;font-size:13.5px;color:var(--muted)}
  .lesson:hover{background:var(--card);color:var(--txt)}
  .lesson.active{background:var(--card2);color:var(--txt);box-shadow:inset 3px 0 0 var(--accent)}
  .lesson .dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:11px}
  .lesson.done .dot{background:var(--ok);border-color:var(--ok);color:#0b1f17}
  .lesson .ic{font-size:13px;flex-shrink:0}
  .lesson .ttl{flex:1}

  .main{padding:30px 40px 80px;max-width:840px}
  .crumbs{color:var(--muted);font-size:13px;margin-bottom:10px}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:4px 10px;border-radius:6px;margin-bottom:14px}
  .b-theory{background:rgba(59,130,246,.15);color:var(--accent2)}
  .b-inter{background:rgba(255,122,24,.15);color:var(--accent)}
  .b-work{background:rgba(52,211,153,.15);color:var(--ok)}
  .main h1{font-size:26px;margin:0 0 18px}
  .body h2{font-size:19px;margin:26px 0 10px}
  .body p{margin:0 0 14px}
  .body ul{margin:0 0 14px;padding-left:20px}
  .body li{margin:6px 0}
  .task{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);
    border-radius:12px;padding:18px 20px;margin:24px 0}
  .task h3{margin:0 0 8px;font-size:16px;color:var(--accent)}
  .task p{margin:0 0 8px;color:var(--muted)}
  .note{color:var(--muted);font-size:13px;margin-top:10px}
  .placeholder{background:var(--card);border:1px dashed var(--line);border-radius:12px;
    padding:40px;text-align:center;color:var(--muted)}

  /* showcase content-type blocks */
  .sectag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    color:var(--accent);background:var(--card2);border:1px solid var(--line);padding:3px 10px;border-radius:5px;margin:32px 0 12px}
  .callout{background:rgba(255,122,24,.08);border:1px solid rgba(255,122,24,.3);border-radius:12px;padding:16px 18px;margin:6px 0}
  .callout b{color:var(--accent)}
  .diagram{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin:6px 0}
  .vcard{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:6px 0;cursor:pointer}
  .vcard .play{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .vcard .play:after{content:"";border-left:14px solid #111;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:4px}
  .vcard b{display:block;font-size:14px}.vcard span{font-size:13px;color:var(--muted)}
  .dl{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:6px 0}
  .dl .ico{font-size:26px}.dl b{display:block;font-size:14px}.dl span{font-size:13px;color:var(--muted)}
  .dlbtn{margin-left:auto;background:var(--card2);border:1px solid var(--line);color:var(--txt);font:inherit;font-weight:600;padding:9px 16px;border-radius:8px;cursor:pointer}
  .dlbtn:hover{border-color:var(--accent)}

  /* inline проверка (theory) */
  .check{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:22px 0}
  .check .ctag{font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:.5px;text-transform:uppercase}
  .check h4{margin:6px 0 12px;font-size:16px}
  .opt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);
    color:var(--txt);border-radius:9px;padding:11px 14px;margin:8px 0;cursor:pointer;font:inherit;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{border-color:var(--ok);background:rgba(52,211,153,.12)}
  .opt.wrong{border-color:var(--bad);background:rgba(248,113,113,.12)}
  .fb{margin-top:10px;font-size:14px;display:none}
  .fb.show{display:block}.fb.ok{color:var(--ok)}.fb.no{color:var(--bad)}

  /* интерактив shell */
  .sim{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:18px 0}
  .sim .shead{background:var(--card);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
  .sim .shead .st{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase}
  .sim .shint{margin-left:auto;font-size:13px;color:var(--muted)}

  /* telegram chat sim */
  .tg{background:var(--tgbg);height:420px;display:flex;flex-direction:column}
  .tg .tgtop{background:var(--tg);padding:10px 16px;display:flex;align-items:center;gap:10px}
  .tg .ava{width:34px;height:34px;border-radius:50%;background:#5288c1;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .tg .tname{font-weight:600;font-size:14px}.tg .tsub{font-size:12px;color:#a8c7e0}
  .tg .chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:78%;padding:8px 12px;border-radius:14px;font-size:14px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .msg.bot{background:#182533;align-self:flex-start;border-bottom-left-radius:4px}
  .msg.me{background:#2b5278;align-self:flex-end;border-bottom-right-radius:4px}
  .msg.bot b{color:#7fb3e8}
  .tg .compose{display:flex;gap:8px;padding:10px;background:#17212b;border-top:1px solid #0b1118}
  .tg .compose input{flex:1;background:#0e1621;border:1px solid #24323f;color:var(--txt);border-radius:20px;padding:9px 14px;font:inherit}
  .tg .compose button{background:var(--tg);border:none;color:#fff;border-radius:20px;padding:0 16px;cursor:pointer;font-weight:600}
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 10px 10px;background:#17212b}
  .chip{background:#0e1621;border:1px solid #24323f;color:#7fb3e8;border-radius:16px;padding:6px 12px;font-size:13px;cursor:pointer}
  .chip:hover{border-color:#5288c1}

  /* panel order sim */
  .pnl{background:var(--card2);padding:18px}
  .pnl .pstep{font-size:13px;color:var(--muted);margin-bottom:12px}
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;cursor:pointer;transition:.12s}
  .pcard:hover{border-color:var(--accent)}
  .pcard.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .pcard b{display:block;font-size:14px}.pcard span{font-size:13px;color:var(--muted)}
  .pbtn{background:var(--accent);color:#111;border:none;font:inherit;font-weight:700;padding:11px 18px;border-radius:9px;cursor:pointer;margin-top:14px}
  .psuccess{background:rgba(52,211,153,.12);border:1px solid var(--ok);color:var(--ok);border-radius:10px;padding:16px;margin-top:14px;font-weight:600}

  .ws{background:linear-gradient(135deg,#15241d,#171a21);border:1px solid var(--line);border-radius:14px;padding:22px;margin:8px 0 22px}
  .ws .live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ok)}
  .ws .live .pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(52,211,153,.6);animation:p 1.8s infinite}
  @keyframes p{70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
  .ws h3{margin:8px 0 4px;font-size:18px}.ws .when{color:var(--muted);font-size:14px;margin-bottom:14px}
  .ws .lib{border-top:1px solid var(--line);padding-top:14px;margin-top:6px}
  .ws .lib b{font-size:13px;color:var(--muted);display:block;margin-bottom:8px}
  .ws .rec{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:14px;color:var(--muted)}
  .ws .rec::before{content:"▶";color:var(--accent);font-size:11px}

  .navbtns{display:flex;justify-content:space-between;gap:12px;margin-top:34px;flex-wrap:wrap}
  .btn{border:none;cursor:pointer;font:inherit;font-weight:700;padding:12px 20px;border-radius:9px}
  .btn-done{background:var(--ok);color:#0b1f17}
  .btn-done.is-done{background:var(--card2);color:var(--muted);cursor:default}
  .btn-next{background:var(--accent);color:#111}

  .menu-toggle{display:none}
  @media(max-width:860px){
    .layout{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:58px;bottom:0;width:300px;z-index:30;transform:translateX(-100%);transition:.25s}
    .side.show{transform:none}
    .menu-toggle{display:inline-block;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
    .main{padding:24px 18px 70px}.pgrid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="top">
  <div style="display:flex;align-items:center;gap:12px;min-width:0">
    <button class="menu-toggle" onclick="document.querySelector('.side').classList.toggle('show')">☰ Уроки</button>
    <a class="back" href="index.html">← К программе</a>
    <span class="ttl">Запуск магазина цифровых товаров за 14 дней</span>
  </div>
  <div class="prog">
    <div class="bar"><i id="progFill"></i></div>
    <span class="pct" id="progPct">0%</span>
  </div>
</div>

<div class="layout">
  <aside class="side" id="side"></aside>
  <main class="main">
    <div class="crumbs" id="crumbs"></div>
    <div id="badge"></div>
    <h1 id="lessonTitle"></h1>
    <div class="body" id="lessonBody"></div>
    <div class="navbtns">
      <button class="btn btn-done" id="doneBtn" onclick="markDone()">Отметить пройденным</button>
      <button class="btn btn-next" id="nextBtn" onclick="goNext()">Следующий урок →</button>
    </div>
  </main>
</div>

<script>
// ponytail: in-memory demo. Real: theory+проверки in H5P, интерактивы = custom HTML/JS sims as SCORM in Moodle.
// types: theory | sim | workshop. sim: 'botfather' | 'panel'.
const MODULES = [
  { t:"Рынок и модели продаж", lessons:[
      {t:"Урок 1: Что продаём и кто покупает", type:"theory", full:true, example:true, taskDemo:"botfather", showcase:true},
      {t:"Воркшоп: разбор ниш с создателями", type:"workshop", full:true} ]},
  { t:"Первая продажа руками", lessons:[
      {t:"Регистрация и пополнение баланса", type:"theory", full:true},
      {t:"Задание: первый заказ в панели", type:"sim", sim:"panel", full:true},
      {t:"Воркшоп: первая сделка вживую", type:"workshop"} ]},
  { t:"Витрина и каналы", lessons:[
      {t:"Задание: создаём Telegram-бота", type:"sim", sim:"botfather", full:true},
      {t:"Простой сайт-витрина", type:"theory"},
      {t:"Воркшоп: запуск витрины", type:"workshop"} ]},
  { t:"Автоматизация без кода", lessons:[
      {t:"Готовый бот-шаблон", type:"theory"},
      {t:"Воркшоп: автоматизация", type:"workshop"} ]},
  { t:"Юнит-экономика", lessons:[
      {t:"Маржа и кэшбэк + калькулятор", type:"theory", full:true, calc:true},
      {t:"Воркшоп: считаем экономику", type:"workshop"} ]},
  { t:"Легализация бизнеса", lessons:[
      {t:"Когда оформляться — а когда рано", type:"theory"},
      {t:"Выбор юрисдикции", type:"theory"},
      {t:"Воркшоп: вопросы по компании", type:"workshop"} ]},
  { t:"Команда и масштаб", lessons:[
      {t:"Саппорт и автоответы", type:"theory"},
      {t:"Делегирование", type:"theory"} ]},
];

const CONTENT = {
  "0.0":`
    <p style="color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 16px">
      Это первый урок-витрина: он специально собран из <b>всех типов контента</b>, которые будут в курсе.
      Каждый блок подписан — так видно весь арсенал.</p>

    <p class="sectag">📖 Теория</p>
    <p>Цифровые товары — это всё, что доставляется кодом, а не курьером: ключи активации игр,
       подарочные карты (Steam, PlayStation, Apple), пополнения внутриигровых валют, подписки, eSIM.
       Покупатель получает товар мгновенно, у продавца нет склада и логистики.</p>
    <h2>Почему на этом зарабатывают</h2>
    <ul>
      <li><b>Нет склада и доставки</b> — товар цифровой, выдаётся автоматически.</li>
      <li><b>Опт дешевле розницы</b> — берёте по оптовой цене, продаёте по рыночной, разница ваша.</li>
      <li><b>Спрос круглый год</b> — игры, подписки и пополнения покупают постоянно.</li>
    </ul>

    <p class="sectag">🖼 Визуальная схема</p>
    <div class="diagram">
      <svg viewBox="0 0 620 120" width="100%" style="max-width:560px;display:block;margin:0 auto" font-family="sans-serif">
        <rect x="6" y="30" width="170" height="58" rx="10" fill="#1d212b" stroke="#2a2f3a"/>
        <text x="91" y="55" fill="#e8eaed" font-size="14" font-weight="700" text-anchor="middle">Поставщик</text>
        <text x="91" y="74" fill="#9aa3b2" font-size="13" text-anchor="middle">опт: 800 ₽</text>
        <rect x="225" y="30" width="170" height="58" rx="10" fill="#1d212b" stroke="#ff7a18"/>
        <text x="310" y="55" fill="#e8eaed" font-size="14" font-weight="700" text-anchor="middle">Вы</text>
        <text x="310" y="74" fill="#9aa3b2" font-size="13" text-anchor="middle">цена: 1100 ₽</text>
        <rect x="444" y="30" width="170" height="58" rx="10" fill="#1d212b" stroke="#2a2f3a"/>
        <text x="529" y="55" fill="#e8eaed" font-size="14" font-weight="700" text-anchor="middle">Покупатель</text>
        <text x="529" y="74" fill="#9aa3b2" font-size="13" text-anchor="middle">платит 1100 ₽</text>
        <line x1="176" y1="59" x2="223" y2="59" stroke="#ff7a18" stroke-width="2" marker-end="url(#ar)"/>
        <line x1="395" y1="59" x2="442" y2="59" stroke="#ff7a18" stroke-width="2" marker-end="url(#ar)"/>
        <text x="310" y="108" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle">ваша маржа: 300 ₽</text>
        <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="#ff7a18"/></marker></defs>
      </svg>
    </div>

    <p class="sectag">💡 Выноска</p>
    <div class="callout"><b>Совет.</b> Не хватайтесь за весь каталог. Возьмите одну нишу (например, пополнения одной игры),
      доведите до первой продажи — потом расширяйтесь. Так быстрее увидите результат и не утоните в товарах.</div>

    <p class="sectag">🎥 Видео · запись разбора</p>
    <div class="vcard" onclick="this.querySelector('span').textContent='Демо · запись откроется в платформе'">
      <div class="play"></div>
      <div><b>Запись вебинара: как выбрать нишу под себя</b><span>47 мин · из библиотеки воркшопов</span></div>
    </div>

    <p class="sectag">🔵 Интерактивный пример</p>
    {{EXAMPLE}}

    <p class="sectag">✅ Проверка понимания</p>
    {{CHECK}}

    <p class="sectag">🧩 Интерактивное задание</p>
    {{TASK}}

    <p class="sectag">📥 Шаблон для скачивания</p>
    <div class="dl"><span class="ico">📄</span>
      <div><b>Калькулятор юнит-экономики (.xlsx)</b><span>готовый шаблон, студент считает свою маржу</span></div>
      <button class="dlbtn" onclick="this.textContent='Демо ✓'">Скачать</button>
    </div>

    <p class="sectag">🎯 Практика-чекпоинт</p>
    <div class="task">
      <h3>Задание урока</h3>
      <p>1. Зарегистрируйтесь на платформе-поставщике (ссылка в материалах).</p>
      <p>2. Найдите 3 товара и сравните оптовую цену с ценой на маркетплейсе.</p>
      <p>3. Отметьте урок пройденным — шаг засчитается в дашборде (= активация).</p>
    </div>`,
  "1.0":`
    <p>Делаем первый реальный шаг внутри платформы: создаём аккаунт и пополняем баланс,
       с которого будут оплачиваться товары.</p>
    <h2>Шаги</h2>
    <ul>
      <li>Создайте аккаунт и подтвердите почту.</li>
      <li>Откройте раздел «Баланс» и пополните на минимальную сумму для теста.</li>
      <li>Проверьте, что средства зачислились и доступны для заказа.</li>
    </ul>
    <p>В следующем уроке — интерактив: сделаете первый заказ в симуляторе панели, прежде чем повторить вживую.</p>`,
  "4.0":`
    <p>Маржа — это не «цена продажи», а разница между продажей и всеми расходами.
       На цифровых товарах главные слагаемые: закупка, кэшбэк поставщика (плюс) и комиссия площадки (минус).</p>
    <h2>Формула</h2>
    <p>Прибыль = (Продажа − Закупка) + Закупка × Кэшбэк% − Продажа × Комиссия%</p>
    <p>Покрутите числа в тренажёре ниже — тот же калькулятор студент получит как шаблон.</p>`,
};

const CHECK = `
  <div class="check">
    <span class="ctag">Проверка понимания</span>
    <h4>Вы купили ключ за 800 ₽ и продали за 1100 ₽. Где ваша маржа?</h4>
    <button class="opt" onclick="checkPick(this,false)">1100 ₽ — это вся выручка</button>
    <button class="opt" onclick="checkPick(this,true)">300 ₽ — разница между продажей и закупкой</button>
    <button class="opt" onclick="checkPick(this,false)">800 ₽ — это и есть прибыль</button>
    <div class="fb" id="qfb"></div>
  </div>`;

function workshopHTML(){
  return `<div class="ws">
      <span class="live"><span class="pulse"></span>Ближайший воркшоп</span>
      <h3>Живой разбор с основателями платформы</h3>
      <div class="when">Каждый месяц · следующий — через 6 дней · Zoom, ссылка в платформе</div>
      <p style="color:var(--muted);margin:0">Создатели разбирают реальные кейсы студентов, отвечают на вопросы,
         показывают, что сейчас хорошо продаётся. Запись попадёт в библиотеку.</p>
      <div class="lib"><b>Записи прошлых воркшопов</b>
        <div class="rec">Как выбрать нишу под себя — 47 мин</div>
        <div class="rec">Разбор ошибок новичков — 39 мин</div>
        <div class="rec">Q&amp;A: налоги и оформление — 52 мин</div>
      </div></div>`;
}

let cur={m:0,l:0};
const done=new Set();
let total=0; MODULES.forEach(m=>total+=m.lessons.length);
const key=(m,l)=>m+"."+l;
const icon=t=> t==="workshop"?"🎥": t==="sim"?"🧩":"📖";

function renderSide(){
  const side=document.getElementById('side'); side.innerHTML='';
  MODULES.forEach((mod,mi)=>{
    const md=document.createElement('div');
    md.className='mod'+(mi===cur.m?' open':'');
    md.innerHTML=`<div class="mhead"><span class="mnum">${mi+1}</span>
        <span class="mttl">${mod.t}</span><span class="chev">▶</span></div><div class="lessons"></div>`;
    md.querySelector('.mhead').onclick=()=>md.classList.toggle('open');
    const lc=md.querySelector('.lessons');
    mod.lessons.forEach((les,li)=>{
      const k=key(mi,li), isDone=done.has(k), active=(mi===cur.m&&li===cur.l);
      const el=document.createElement('div');
      el.className='lesson'+(active?' active':'')+(isDone?' done':'');
      el.innerHTML=`<span class="dot">${isDone?'✓':''}</span>
        <span class="ic">${icon(les.type)}</span><span class="ttl">${les.t}</span>`;
      el.onclick=()=>{cur={m:mi,l:li};renderSide();renderLesson();document.querySelector('.side').classList.remove('show')};
      lc.appendChild(el);
    });
    side.appendChild(md);
  });
}

function renderLesson(){
  const mod=MODULES[cur.m], les=mod.lessons[cur.l];
  document.getElementById('crumbs').textContent=`Модуль ${cur.m+1} · ${mod.t}`;
  document.getElementById('lessonTitle').textContent=les.t;
  const bm={theory:['b-theory','📖 Теория'],sim:['b-inter','🧩 Интерактивное задание'],workshop:['b-work','🎥 Воркшоп']}[les.type];
  const lbl = les.showcase ? '📚 Урок 1 · все типы контента' : bm[1];
  document.getElementById('badge').innerHTML=`<span class="badge ${bm[0]}">${lbl}</span>`;

  const body=document.getElementById('lessonBody');
  if(les.type==="workshop"){ body.innerHTML=workshopHTML(); }
  else if(les.type==="sim" && les.sim==="botfather"){ body.innerHTML=botfatherHTML(); bfStart(); }
  else if(les.type==="sim" && les.sim==="panel"){ body.innerHTML=panelHTML(); panelRender(); }
  else {
    let c=CONTENT[key(cur.m,cur.l)];
    if(c){
      c=c.replace('{{EXAMPLE}}', les.example?exampleHTML():'');
      c=c.replace('{{CHECK}}', CHECK);
      c=c.replace('{{TASK}}', les.taskDemo==='botfather'?botfatherHTML():'');
      if(les.calc) c+=calcHTML();
      body.innerHTML=c;
      if(les.example) exampleRun();
      if(les.taskDemo==='botfather') bfStart();
      if(les.calc) calcRun();
    } else {
      body.innerHTML=`<div class="placeholder">Демонстрационная версия. Конспект и материалы этого урока
        готовятся в рамках разработки курса.<br><br>Откройте уроки <b>📖/🧩/🎥</b> в первых модулях — там реальный формат.</div>`;
    }
  }
  const db=document.getElementById('doneBtn');
  if(done.has(key(cur.m,cur.l))){db.textContent='Пройдено ✓';db.classList.add('is-done')}
  else{db.textContent='Отметить пройденным';db.classList.remove('is-done')}
  window.scrollTo({top:0,behavior:'smooth'});
}

/* проверка */
function checkPick(el,ok){
  document.querySelectorAll('.check .opt').forEach(o=>o.style.pointerEvents='none');
  el.classList.add(ok?'correct':'wrong');
  const fb=document.getElementById('qfb');
  fb.className='fb show '+(ok?'ok':'no');
  fb.textContent=ok?'✓ Верно. Маржа = 1100 − 800 = 300 ₽. С кэшбэком поставщика она ещё выше.'
                  :'✗ Не то. Маржа — это разница: 1100 − 800 = 300 ₽.';
}

/* интерактивный пример: визуализация маржи */
function exampleHTML(){
  return `<div class="sim"><div class="shead"><span class="st" style="color:var(--accent2)">Интерактивный пример</span>
      <span class="shint">подвигайте — посмотрите, как появляется маржа</span></div>
    <div class="pnl">
      <div class="pgrid" style="grid-template-columns:1fr 1fr">
        <div><label style="font-size:13px;color:var(--muted)">Закупка: <b id="ex_b">800</b> ₽</label>
          <input id="ex_buy" type="range" min="100" max="2000" value="800" oninput="exampleRun()" style="width:100%;margin-top:6px"></div>
        <div><label style="font-size:13px;color:var(--muted)">Продажа: <b id="ex_s">1100</b> ₽</label>
          <input id="ex_sell" type="range" min="100" max="3000" value="1100" oninput="exampleRun()" style="width:100%;margin-top:6px"></div>
      </div>
      <div style="display:flex;height:34px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin-top:14px">
        <div id="ex_cost" style="background:#2b3340;display:flex;align-items:center;justify-content:center;font-size:12px;color:#cbd5e1">закупка</div>
        <div id="ex_marg" style="background:var(--ok);display:flex;align-items:center;justify-content:center;font-size:12px;color:#0b1f17;font-weight:700">маржа</div>
      </div>
      <div style="margin-top:8px;color:var(--muted);font-size:14px">Маржа со сделки: <b id="ex_out" style="color:var(--ok)">300 ₽</b></div>
    </div></div>
    <p class="note">Это интерактивный пример: студент понимает маржу, манипулируя числами, а не читая абзац. Оценки нет.</p>`;
}
function exampleRun(){
  const b=+document.getElementById('ex_buy').value, s=+document.getElementById('ex_sell').value;
  document.getElementById('ex_b').textContent=b;
  document.getElementById('ex_s').textContent=s;
  const marg=Math.max(s-b,0), tot=Math.max(s,1);
  document.getElementById('ex_cost').style.width=(Math.min(b,s)/tot*100)+'%';
  document.getElementById('ex_marg').style.width=(marg/tot*100)+'%';
  document.getElementById('ex_out').textContent=marg+' ₽';
}

/* интерактивный пример: калькулятор */
function calcHTML(){
  return `<div class="sim"><div class="shead"><span class="st" style="color:var(--accent2)">Интерактивный пример</span>
      <span class="shint">калькулятор · считается на платформе</span></div>
    <div class="pnl">
      <div class="pgrid">
        <div><label style="font-size:13px;color:var(--muted)">Закупка, ₽</label><input id="c_buy" type="number" value="800" oninput="calcRun()" style="width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px;margin-top:4px"></div>
        <div><label style="font-size:13px;color:var(--muted)">Продажа, ₽</label><input id="c_sell" type="number" value="1100" oninput="calcRun()" style="width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px;margin-top:4px"></div>
        <div><label style="font-size:13px;color:var(--muted)">Кэшбэк, %</label><input id="c_cb" type="number" value="8" oninput="calcRun()" style="width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px;margin-top:4px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:12px">
        <span style="color:var(--muted);font-size:13px">Чистая прибыль со сделки (комиссия 5%)</span>
        <span style="font-size:24px;font-weight:800;color:var(--ok)" id="c_out">—</span>
      </div>
    </div></div>`;
}
function calcRun(){
  const v=id=>parseFloat(document.getElementById(id).value)||0;
  const buy=v('c_buy'),sell=v('c_sell'),cb=v('c_cb');
  const profit=(sell-buy)+buy*cb/100-sell*0.05;
  const o=document.getElementById('c_out'); if(o) o.textContent=Math.round(profit)+' ₽';
}

/* ---- интерактив: симулятор @BotFather ---- */
let bf={step:0,name:''};
function botfatherHTML(){
  return `<p>Задача: создать Telegram-бота для магазина через <b>@BotFather</b>. Пройдите диалог как в реальном Telegram —
     ниже рабочая симуляция интерфейса.</p>
    <div class="sim"><div class="shead"><span class="st">Интерактивное задание</span>
      <span class="shint">кастомный HTML/JS · в Moodle — SCORM</span></div>
      <div class="tg">
        <div class="tgtop"><div class="ava">BF</div><div><div class="tname">BotFather</div><div class="tsub">bot</div></div></div>
        <div class="chat" id="bfChat"></div>
        <div class="chips" id="bfChips"></div>
        <div class="compose">
          <input id="bfInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')bfSend()">
          <button onclick="bfSend()">▶</button>
        </div>
      </div></div>
    <p class="note">В реальном курсе симулятор валидирует каждый шаг и отмечает задание выполненным в платформе.</p>`;
}
function bfPush(who,html){
  const c=document.getElementById('bfChat');
  const d=document.createElement('div'); d.className='msg '+who; d.innerHTML=html; c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}
function bfChips(arr){
  const w=document.getElementById('bfChips');
  w.innerHTML=''; arr.forEach(t=>{const b=document.createElement('div');b.className='chip';b.textContent=t;
    b.onclick=()=>{document.getElementById('bfInput').value=t;bfSend()};w.appendChild(b)});
}
function bfStart(){
  bf={step:0,name:''};
  document.getElementById('bfChat').innerHTML='';
  bfPush('bot','Привет! Я <b>BotFather</b> — помогу создать и настроить ботов.\nОтправьте команду, чтобы создать нового бота.');
  bfChips(['/newbot']);
}
function bfSend(){
  const inp=document.getElementById('bfInput'); const t=(inp.value||'').trim(); if(!t)return;
  bfPush('me',t); inp.value='';
  setTimeout(()=>bfReply(t),250);
}
function bfReply(t){
  if(bf.step===0){
    if(/\/newbot/i.test(t)){ bf.step=1; bfPush('bot','Хорошо. Как будем называть бота? Это <b>отображаемое имя</b>, например «Мой магазин ключей».'); bfChips(['Мой магазин ключей']); }
    else { bfPush('bot','Чтобы создать бота, отправьте команду <b>/newbot</b>.'); bfChips(['/newbot']); }
  } else if(bf.step===1){
    bf.name=t; bf.step=2;
    bfPush('bot','Отлично. Теперь придумайте <b>username</b> бота. Он должен заканчиваться на <b>bot</b>, например <b>myshop_bot</b>.');
    bfChips(['myshop_bot','magazin']);
  } else if(bf.step===2){
    if(/bot$/i.test(t)){
      bf.step=3;
      const tok=Math.floor(1e9+Math.random()*9e9)+':AA'+Math.random().toString(36).slice(2,12)+'Hk';
      bfPush('bot',`Готово! 🎉 Бот <b>${bf.name}</b> создан.\nВот токен для доступа к HTTP API:\n<b>${tok}</b>\n\nХраните его в секрете. Дальше подключим к нему витрину магазина.`);
      bfChips([]);
      document.getElementById('bfInput').disabled=true;
    } else {
      bfPush('bot','Username должен заканчиваться на <b>bot</b>. Попробуйте, например, <b>myshop_bot</b>.');
      bfChips(['myshop_bot']);
    }
  } else {
    bfPush('bot','Бот уже создан. В следующем уроке подключим к нему каталог.');
  }
}

/* ---- интерактив: симулятор заказа в панели ---- */
let pnl={step:0,sel:-1};
const PRODUCTS=[{n:'Steam 1000 ₽',p:'920 ₽'},{n:'Roblox 800 Robux',p:'690 ₽'},{n:'PSN 2000 ₽',p:'1840 ₽'}];
function panelHTML(){
  return `<p>Задача: оформить первый заказ в панели платформы. Пройдите по шагам в симуляторе.</p>
    <div class="sim"><div class="shead"><span class="st">Интерактивное задание</span>
      <span class="shint">кастомный HTML/JS · в Moodle — SCORM</span></div>
      <div class="pnl" id="pnlBox"></div></div>
    <p class="note">Реальный заказ на платформе = активация. В курсе шаг трекается и попадает в дашборд заказчика.</p>`;
}
function panelRender(){
  pnl={step:0,sel:-1}; drawPanel();
}
function drawPanel(){
  const box=document.getElementById('pnlBox'); if(!box)return;
  if(pnl.step===0){
    box.innerHTML='<div class="pstep">Шаг 1 из 3 · выберите товар для продажи</div><div class="pgrid">'+
      PRODUCTS.map((p,i)=>`<div class="pcard${pnl.sel===i?' sel':''}" onclick="panelSel(${i})"><b>${p.n}</b><span>опт: ${p.p}</span></div>`).join('')+'</div>'+
      (pnl.sel>=0?'<button class="pbtn" onclick="panelStep(1)">Далее →</button>':'');
  } else if(pnl.step===1){
    const p=PRODUCTS[pnl.sel];
    box.innerHTML=`<div class="pstep">Шаг 2 из 3 · подтвердите заказ</div>
      <div class="pcard sel"><b>${p.n}</b><span>опт: ${p.p}</span></div>
      <button class="pbtn" onclick="panelStep(2)">Купить за ${p.p}</button>`;
  } else if(pnl.step===2){
    box.innerHTML=`<div class="pstep">Шаг 3 из 3 · оплата</div>
      <p style="color:var(--muted);margin:0 0 8px">Списываем с баланса аккаунта.</p>
      <button class="pbtn" onclick="panelStep(3)">Оплатить с баланса</button>`;
  } else {
    const p=PRODUCTS[pnl.sel];
    box.innerHTML=`<div class="psuccess">✓ Заказ выполнен. Ключ «${p.n}» выдан покупателю мгновенно.</div>
      <p class="note" style="margin-top:12px">Это и есть первая продажа. В реальном курсе такой заказ = ваша активация в системе.</p>`;
  }
}
function panelSel(i){ pnl.sel=i; drawPanel(); }
function panelStep(s){ pnl.step=s; drawPanel(); }

function markDone(){ done.add(key(cur.m,cur.l)); updateProg(); renderSide(); renderLesson(); }
function updateProg(){
  const pct=Math.round(done.size/total*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}
function goNext(){
  let {m,l}=cur;
  if(l+1<MODULES[m].lessons.length) l++;
  else if(m+1<MODULES.length){m++;l=0} else return;
  cur={m,l};renderSide();renderLesson();
}

renderSide();renderLesson();updateProg();
</script>
</body>
